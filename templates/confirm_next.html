<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Next Step</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 40px;
    }
    .box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
      text-align: center;
    }
    .btn {
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h4>Do you have <strong>{{ next_mode.upper() }}</strong> FASTQ files to upload?</h4>
    <form method="POST">
      <button type="submit" name="yes" value="1" class="btn btn-success">✅ Yes, proceed to upload</button>
      <button type="submit" name="no" value="1" class="btn btn-danger">❌ No, skip this step</button>
    </form>
  </div>
</body>
</html>
