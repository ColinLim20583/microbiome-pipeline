<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload {{ mode.upper() }} FASTQ Files</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 40px;
    }
    .container {
      max-width: 700px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <h2 class="mb-4 text-center">📂 Upload {{ mode.upper() }} Paired-End FASTQ Files</h2>

  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="fastq_files" class="form-label">Select your paired-end .fastq or .fastq.gz files</label>
      <input type="file" class="form-control" id="fastq_files" name="fastq_files" multiple required>
    </div>
    <button type="submit" class="btn btn-primary w-100">🚀 Upload Files</button>
  </form>
</div>
</body>
</html>
