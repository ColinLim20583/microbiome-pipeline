<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metadata Entry - {{ mode.upper() }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 30px;
    }
    .container {
      max-width: 950px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    table input {
      width: 100%;
    }
  </style>
</head>
<body>
<div class="container">
  <h2 class="mb-4">🧾 Metadata Entry for {{ mode.upper() }} Samples</h2>

  {% if samples %}
  <form method="POST">
    <table class="table table-bordered table-striped">
      <thead class="table-light">
  <tr>
    <th>Sample ID</th>
    <th>Treatment</th>
    <th>Timepoint</th>
    <th>Location</th>
    <th>Soil Type</th>
    <th>Crop Type</th>
    <th>pH Level</th>
    <th>Notes</th>
  </tr>
</thead>
<tbody>
  {% for sample in samples %}
  <tr>
    <td><input type="text" name="sample_id_{{ loop.index }}" value="{{ sample }}" readonly></td>
    <td><input type="text" name="treatment_{{ loop.index }}" required></td>
    <td><input type="text" name="timepoint_{{ loop.index }}" required></td>
    <td><input type="text" name="location_{{ loop.index }}" required></td>
    <td><input type="text" name="soil_{{ loop.index }}" required></td>
    <td><input type="text" name="crop_{{ loop.index }}"></td>
    <td><input type="text" name="ph_{{ loop.index }}"></td>
    <td><input type="text" name="note_{{ loop.index }}"></td>
  </tr>
  {% endfor %}
</tbody>
    </table>
    <input type="hidden" name="total" value="{{ samples|length }}">
    <button type="submit" class="btn btn-success mt-3">✅ Save Metadata & Continue</button>
  </form>
  {% else %}
    <div class="alert alert-warning">⚠️ No samples found for metadata entry.</div>
  {% endif %}

</div>
</body>
</html>
